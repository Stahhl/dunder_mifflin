global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8081"]

  - job_name: profile-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["profile-service:8091"]

  - job_name: sales-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sales-service:8092"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8093"]

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["inventory-service:8094"]

  - job_name: finance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["finance-service:8095"]

  - job_name: wuphf-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["wuphf-service:8096"]
