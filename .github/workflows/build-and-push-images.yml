name: Build and Push App Images

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "apps/**"
      - ".github/workflows/build-and-push-images.yml"
  workflow_dispatch:
    inputs:
      force_all:
        description: Build and push all app/service images.
        type: boolean
        default: false
      image_tag:
        description: "Optional image tag override (default: sha-<commit>)."
        required: false
        type: string

concurrency:
  group: build-push-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      image_tag: ${{ steps.matrix.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build matrix
        id: matrix
        shell: bash
        env:
          FORCE_ALL: ${{ github.event.inputs.force_all || 'false' }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          REGISTRY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          image_tag="${INPUT_IMAGE_TAG}"
          if [[ -z "${image_tag}" ]]; then
            image_tag="sha-${HEAD_SHA}"
          fi
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"

          owner="$(echo "${REGISTRY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          build_all=0
          base_sha="${BEFORE_SHA}"
          head_sha="${HEAD_SHA}"

          if [[ "${FORCE_ALL}" == "true" ]]; then
            build_all=1
          fi

          if [[ ${build_all} -eq 0 ]]; then
            if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
              if git rev-parse "${head_sha}^" >/dev/null 2>&1; then
                base_sha="$(git rev-parse "${head_sha}^")"
              else
                build_all=1
              fi
            fi
          fi

          changed_files=()
          if [[ ${build_all} -eq 0 ]]; then
            mapfile -t changed_files < <(git diff --name-only "${base_sha}" "${head_sha}")
          fi

          components=(
            "gateway|services/gateway|services/gateway/Dockerfile|gateway"
            "profile-service|services/profile-service|services/profile-service/Dockerfile|profile-service"
            "sales-service|services/sales-service|services/sales-service/Dockerfile|sales-service"
            "order-service|services/order-service|services/order-service/Dockerfile|order-service"
            "inventory-service|services/inventory-service|services/inventory-service/Dockerfile|inventory-service"
            "finance-service|services/finance-service|services/finance-service/Dockerfile|finance-service"
            "wuphf-service|services/wuphf-service|services/wuphf-service/Dockerfile|wuphf-service"
            "portal-web|apps/portal|apps/portal/Dockerfile|portal-web"
            "infinity-web|apps/infinity|apps/infinity/Dockerfile|infinity-web"
            "accounting-web|apps/accounting|apps/accounting/Dockerfile|accounting-web"
            "wuphf-widget|apps/wuphf-widget|apps/wuphf-widget/Dockerfile|wuphf-widget"
            "warehouse-mobile|apps/warehouse-mobile|apps/warehouse-mobile/Dockerfile|warehouse-mobile"
          )

          matrix="[]"
          for component in "${components[@]}"; do
            IFS='|' read -r name context dockerfile image_name <<<"${component}"
            should_build=0

            if [[ ${build_all} -eq 1 ]]; then
              should_build=1
            else
              for changed in "${changed_files[@]}"; do
                if [[ "${changed}" == "${context}"/* ]]; then
                  should_build=1
                  break
                fi
              done
            fi

            if [[ ${should_build} -eq 1 ]]; then
              matrix="$(
                jq -c \
                  --arg name "${name}" \
                  --arg context "${context}" \
                  --arg dockerfile "${dockerfile}" \
                  --arg image "ghcr.io/${owner}/${image_name}" \
                  '. + [{
                    name: $name,
                    context: $context,
                    dockerfile: $dockerfile,
                    image: $image
                  }]' <<<"${matrix}"
              )"
            fi
          done

          if [[ "${matrix}" == "[]" ]]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ matrix.image }}:${{ needs.detect-changes.outputs.image_tag }}
            ${{ matrix.image }}:main
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  no-changes:
    name: No image changes
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes != 'true'
    steps:
      - name: No-op
        run: echo "No app/service image changes detected."
