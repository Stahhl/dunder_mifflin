      SERVER_PORT: 8094
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
    ports:
      - "${INVENTORY_SERVICE_PORT:-8094}:8094"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8094/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  finance-service:
    profiles: ["app", "e2e"]
    build:
      context: ./services/finance-service
      dockerfile: Dockerfile
    image: dunder/finance-service:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: finance-service
      SERVER_PORT: 8095
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
    ports:
      - "${FINANCE_SERVICE_PORT:-8095}:8095"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8095/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  wuphf-service:
    profiles: ["app", "e2e"]
    build:
      context: ./services/wuphf-service
      dockerfile: Dockerfile
    image: dunder/wuphf-service:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: wuphf-service
      SERVER_PORT: 8096
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
    ports:
      - "${WUPHF_SERVICE_PORT:-8096}:8096"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8096/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  bi-ingestion-service:
    profiles: ["bi", "test"]
    build:
      context: ./services/bi-ingestion-service
      dockerfile: Dockerfile
    image: dunder/bi-ingestion-service:dev
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: bi-ingestion-service
      SERVER_PORT: 8097
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
      BI_QUEUE: ${BI_QUEUE:-bi.domain-events.q}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT_INTERNAL: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-bi_warehouse}
      CLICKHOUSE_INGESTOR_USER: ${CLICKHOUSE_INGESTOR_USER:-bi_ingestor}
      CLICKHOUSE_INGESTOR_PASSWORD: ${CLICKHOUSE_INGESTOR_PASSWORD:-bi_ingestor_password}
      CLICKHOUSE_BI_READER_USER: ${CLICKHOUSE_BI_READER_USER:-bi_reader}
      CLICKHOUSE_BI_READER_PASSWORD: ${CLICKHOUSE_BI_READER_PASSWORD:-bi_reader_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BI_RAW_BUCKET: ${BI_RAW_BUCKET:-dmf-bi-raw-events}
    ports:
      - "${BI_INGESTION_SERVICE_PORT:-8097}:8097"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8097/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 8s
    networks: [dmf]

  portal-web:
    profiles: ["app", "e2e"]
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
    image: dunder/portal-web:dev
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      APP_NAME: portal-web
      APP_PORT: 3000
    ports:
      - "${PORTAL_WEB_PORT:-3000}:3000"
    networks: [dmf]

  infinity-web:
    profiles: ["app", "e2e"]
    build:
      context: ./apps/infinity
      dockerfile: Dockerfile
    image: dunder/infinity-web:dev
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      APP_NAME: infinity-web
      APP_PORT: 3001
    ports:
      - "${INFINITY_WEB_PORT:-3001}:3001"
    networks: [dmf]

  accounting-web:
    profiles: ["app", "e2e"]
    build:
      context: ./apps/accounting
      dockerfile: Dockerfile
    image: dunder/accounting-web:dev
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      APP_NAME: accounting-web
      APP_PORT: 3002
    ports:
      - "${ACCOUNTING_WEB_PORT:-3002}:3002"
    networks: [dmf]

  wuphf-widget:
    profiles: ["app", "e2e"]
    build:
      context: ./apps/wuphf-widget
      dockerfile: Dockerfile
    image: dunder/wuphf-widget:dev
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      APP_NAME: wuphf-widget
      APP_PORT: 3003
    ports:
      - "${WUPHF_WIDGET_PORT:-3003}:3003"
    networks: [dmf]

  warehouse-mobile:
    profiles: ["app", "e2e"]
    build:
      context: ./apps/warehouse-mobile
      dockerfile: Dockerfile
    image: dunder/warehouse-mobile:dev
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      APP_NAME: warehouse-mobile
      APP_PORT: 3004
      EXPO_PUBLIC_GATEWAY_BASE_URL: http://host.docker.internal:${GATEWAY_PORT:-8081}
      EXPO_PUBLIC_KEYCLOAK_BASE_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8080}
      EXPO_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-scranton-branch}
      EXPO_PUBLIC_KEYCLOAK_CLIENT_ID: warehouse-mobile
      EXPO_PUBLIC_E2E_MOCK_SCANNER: "true"
    ports:
      - "${WAREHOUSE_MOBILE_PORT:-3004}:3004"
    networks: [dmf]

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    profiles: ["app", "observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./platform/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [dmf]

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    profiles: ["app", "observability"]
    depends_on:
      keycloak:
        condition: service_healthy
      keycloak-seed:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
    environment:
      GF_SERVER_ROOT_URL: http://${GRAFANA_PUBLIC_HOST:-host.docker.internal}:${GRAFANA_PORT:-3005}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: dunder-observability
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: observability-secret-change-me
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email roles
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://${KEYCLOAK_PUBLIC_HOST:-host.docker.internal}:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-scranton-branch}/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM:-scranton-branch}/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM:-scranton-branch}/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(roles[*], 'it-support') && 'Viewer' || 'None'
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "true"
      GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH: roles
      GF_AUTH_GENERIC_OAUTH_ALLOWED_GROUPS: it-support
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "false"
      GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./platform/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3005}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 15s
    networks: [dmf]

  unit-tests:
    image: node:20-alpine
    profiles: ["test"]
    init: true
    working_dir: /workspace
    command:
      - /bin/sh
      - -lc
      - >
        corepack enable &&
        corepack prepare pnpm@10.4.0 --activate &&
        pnpm config set store-dir /pnpm-store &&
        pnpm install --no-frozen-lockfile &&
        pnpm -r --if-present test
    environment:
      CI: "true"
      PNPM_STORE_PATH: /pnpm-store
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm-store
    networks: [dmf]

  order-service-integration-tests:
    image: gradle:8.10.2-jdk21
    profiles: ["test"]
    init: true
    working_dir: /workspace/services/order-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - gradle --no-daemon test --tests '*integration*'
    environment:
      CI: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
    volumes:
      - ./:/workspace
    networks: [dmf]

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.51.1-jammy
    profiles: ["test"]
    init: true
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - >
        corepack enable &&
        corepack prepare pnpm@10.4.0 --activate &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_BASE_URL}/actuator/health" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "http://host.docker.internal:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-scranton-branch}/.well-known/openid-configuration" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_WAREHOUSE_BASE_URL}/" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_PORTAL_BASE_URL}/" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_INFINITY_BASE_URL}/" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_ACCOUNTING_BASE_URL}/" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_WUPHF_WIDGET_BASE_URL}/wuphf-widget.js" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        ready=0; for i in $(seq 1 90); do if curl -fsS "$${PLAYWRIGHT_GRAFANA_BASE_URL}/login" >/dev/null 2>&1; then ready=1; break; fi; sleep 2; done; [ "$$ready" -eq 1 ] &&
        pnpm config set store-dir /pnpm-store &&
        pnpm install --no-frozen-lockfile &&
        pnpm test:e2e:gate
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://host.docker.internal:${GATEWAY_PORT:-8081}
      PLAYWRIGHT_PORTAL_BASE_URL: http://host.docker.internal:${PORTAL_WEB_PORT:-3000}
      PLAYWRIGHT_WAREHOUSE_BASE_URL: http://host.docker.internal:${WAREHOUSE_MOBILE_PORT:-3004}
      PLAYWRIGHT_INFINITY_BASE_URL: http://host.docker.internal:${INFINITY_WEB_PORT:-3001}
      PLAYWRIGHT_ACCOUNTING_BASE_URL: http://host.docker.internal:${ACCOUNTING_WEB_PORT:-3002}
      PLAYWRIGHT_WUPHF_WIDGET_BASE_URL: http://host.docker.internal:${WUPHF_WIDGET_PORT:-3003}
      PLAYWRIGHT_GRAFANA_BASE_URL: http://host.docker.internal:${GRAFANA_PORT:-3005}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./:/workspace
      - pnpm-store:/pnpm-store
    networks: [dmf]

  bi-e2e-tests:
    image: node:20-alpine
    profiles: ["test"]
    init: true
    working_dir: /workspace
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      metabase:
        condition: service_healthy
      bi-ingestion-service:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - node tests/bi/bi-e2e.mjs
    environment:
      BI_TEST_RABBITMQ_MANAGEMENT_URL: http://rabbitmq:15672
      BI_TEST_RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      BI_TEST_RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      BI_TEST_EVENT_EXCHANGE: dm.domain.events
      BI_TEST_CLICKHOUSE_URL: http://clickhouse:8123
      BI_TEST_CLICKHOUSE_DB: ${CLICKHOUSE_DB:-bi_warehouse}
      BI_TEST_CLICKHOUSE_INGESTOR_USER: ${CLICKHOUSE_INGESTOR_USER:-bi_ingestor}
      BI_TEST_CLICKHOUSE_INGESTOR_PASSWORD: ${CLICKHOUSE_INGESTOR_PASSWORD:-bi_ingestor_password}
      BI_TEST_CLICKHOUSE_READER_USER: ${CLICKHOUSE_BI_READER_USER:-bi_reader}
      BI_TEST_CLICKHOUSE_READER_PASSWORD: ${CLICKHOUSE_BI_READER_PASSWORD:-bi_reader_password}
      BI_TEST_MINIO_URL: http://minio:9000
      BI_TEST_METABASE_URL: http://metabase:3000
      BI_TEST_INGESTION_URL: http://bi-ingestion-service:8097
      BI_TEST_RAW_BUCKET: ${BI_RAW_BUCKET:-dmf-bi-raw-events}
    volumes:
      - ./:/workspace
    networks: [dmf]

volumes:
  postgres-data:
  rabbitmq-data:
  keycloak-data:
  ldap-data:
  ldap-config:
  grafana-data:
  pnpm-store:
  clickhouse-data:
  minio-data:
  metabase-data:

networks:
  dmf:
    driver: bridge
