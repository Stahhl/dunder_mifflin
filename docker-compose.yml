name: dunder-mifflin

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["infra", "app", "e2e", "test"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./platform/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dundermifflin} -d ${POSTGRES_DB:-dundermifflin}"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [dmf]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    profiles: ["infra", "app", "e2e", "test", "bi"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./platform/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./platform/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [dmf]

  openldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    profiles: ["infra", "app", "e2e"]
    command: ["--copy-service"]
    environment:
      LDAP_ORGANISATION: Dunder Mifflin
      LDAP_DOMAIN: dundermifflin.com
      LDAP_BASE_DN: dc=dundermifflin,dc=com
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-admin}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD:-admin}
      LDAP_TLS: "false"
    ports:
      - "${LDAP_PORT:-389}:389"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./platform/ldap/users.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-users.ldif:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ldapsearch -x -H ldap://127.0.0.1:389 -D \"cn=admin,dc=dundermifflin,dc=com\" -w ${LDAP_ADMIN_PASSWORD:-admin} -b \"dc=dundermifflin,dc=com\" \"(uid=jhalpert)\" dn | grep -q \"dn: uid=jhalpert,ou=people,dc=dundermifflin,dc=com\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [dmf]

  ldap-seed:
    image: osixia/openldap:1.5.0
    restart: "no"
    profiles: ["infra", "app", "e2e"]
    depends_on:
      openldap:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    volumes:
      - ./platform/ldap/users.ldif:/seed/users.ldif:ro
    command:
      - >
        until ldapsearch -x -H ldap://openldap:389 -D "cn=admin,dc=dundermifflin,dc=com" -w ${LDAP_ADMIN_PASSWORD:-admin} -b "dc=dundermifflin,dc=com" "(objectClass=*)" dn >/dev/null 2>&1; do sleep 2; done;
        ldapsearch -x -H ldap://openldap:389 -D "cn=admin,dc=dundermifflin,dc=com" -w ${LDAP_ADMIN_PASSWORD:-admin} -b "dc=dundermifflin,dc=com" "(uid=jhalpert)" dn | grep -q "dn: uid=jhalpert,ou=people,dc=dundermifflin,dc=com" || ldapadd -x -H ldap://openldap:389 -D "cn=admin,dc=dundermifflin,dc=com" -w ${LDAP_ADMIN_PASSWORD:-admin} -f /seed/users.ldif
    networks: [dmf]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    profiles: ["infra", "app", "e2e"]
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-dundermifflin}
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-dundermifflin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_healthy
      ldap-seed:
        condition: service_completed_successfully
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./platform/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 35s
    networks: [dmf]

  keycloak-seed:
    image: quay.io/keycloak/keycloak:26.0
    restart: "no"
    profiles: ["infra", "app", "e2e"]
    depends_on:
      keycloak:
        condition: service_healthy
      ldap-seed:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/seed/seed_keycloak_ldap.sh"]
    volumes:
      - ./platform/keycloak/seed_keycloak_ldap.sh:/seed/seed_keycloak_ldap.sh:ro
    networks: [dmf]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    profiles: ["infra", "app", "e2e"]
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "MailHog", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks: [dmf]

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    restart: unless-stopped
    profiles: ["bi", "test"]
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-bi_warehouse}
      CLICKHOUSE_USER: ${CLICKHOUSE_INGESTOR_USER:-bi_ingestor}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_INGESTOR_PASSWORD:-bi_ingestor_password}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9006}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [dmf]

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    profiles: ["bi", "test"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [dmf]

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    restart: "no"
    profiles: ["bi", "test"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >
        /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        /usr/bin/mc mb --ignore-existing local/${BI_RAW_BUCKET:-dmf-bi-raw-events};
    networks: [dmf]

  metabase:
    image: metabase/metabase:v0.55.8
    restart: unless-stopped
    profiles: ["bi", "test"]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "${METABASE_PORT:-3006}:3000"
    volumes:
      - metabase-data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 25s
    networks: [dmf]

  gateway:
    profiles: ["app", "e2e"]
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    image: dunder/gateway:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-seed:
        condition: service_completed_successfully
      profile-service:
        condition: service_healthy
      sales-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      wuphf-service:
        condition: service_healthy
    environment:
      SERVICE_NAME: gateway
      SERVER_PORT: 8081
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-scranton-branch}
      KEYCLOAK_INTERNAL_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_PORT: ${KEYCLOAK_PORT:-8080}
      OIDC_CLIENT_ID: dunder-mifflin-gateway
      OIDC_CLIENT_SECRET: gateway-secret-change-me
      PROFILE_SERVICE_BASE_URL: http://profile-service:8091
      SALES_SERVICE_BASE_URL: http://sales-service:8092
      ORDER_SERVICE_BASE_URL: http://order-service:8093
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8094
      FINANCE_SERVICE_BASE_URL: http://finance-service:8095
      WUPHF_SERVICE_BASE_URL: http://wuphf-service:8096
      PORTAL_WEB_BASE_URL: http://host.docker.internal:${PORTAL_WEB_PORT:-3000}
      INFINITY_WEB_BASE_URL: http://host.docker.internal:${INFINITY_WEB_PORT:-3001}
      ACCOUNTING_WEB_BASE_URL: http://host.docker.internal:${ACCOUNTING_WEB_PORT:-3002}
      MOBILE_WEB_ORIGINS: http://localhost:${PORTAL_WEB_PORT:-3000},http://host.docker.internal:${PORTAL_WEB_PORT:-3000},http://localhost:${INFINITY_WEB_PORT:-3001},http://host.docker.internal:${INFINITY_WEB_PORT:-3001},http://localhost:${ACCOUNTING_WEB_PORT:-3002},http://host.docker.internal:${ACCOUNTING_WEB_PORT:-3002},http://localhost:${WAREHOUSE_MOBILE_PORT:-3004},http://host.docker.internal:${WAREHOUSE_MOBILE_PORT:-3004}
    ports:
      - "${GATEWAY_PORT:-8081}:8081"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  profile-service:
    profiles: ["app", "e2e"]
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
    image: dunder/profile-service:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: profile-service
      SERVER_PORT: 8091
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
    ports:
      - "${PROFILE_SERVICE_PORT:-8091}:8091"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8091/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  sales-service:
    profiles: ["app", "e2e"]
    build:
      context: ./services/sales-service
      dockerfile: Dockerfile
    image: dunder/sales-service:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: sales-service
      SERVER_PORT: 8092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
    ports:
      - "${SALES_SERVICE_PORT:-8092}:8092"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8092/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  order-service:
    profiles: ["app", "e2e"]
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    image: dunder/order-service:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_NAME: order-service
      SERVER_PORT: 8093
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dundermifflin}
      POSTGRES_USER: ${POSTGRES_USER:-dundermifflin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bears_beets_battlestar}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dunder}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-mifflin}
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: dm.domain.events
    ports:
      - "${ORDER_SERVICE_PORT:-8093}:8093"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8093/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks: [dmf]

  inventory-service:
    profiles: ["app", "e2e"]
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    image: dunder/inventory-service:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
